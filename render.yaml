databases:
  - name: educourse-db
    databaseName: educourse
    user: educourse

services:
  - type: web
    name: educourse
    runtime: python
    buildCommand: bash build.sh
    startCommand: gunicorn course_system.wsgi:application
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: educourse-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: REGISTRATION_ACCESS_PASSWORD
        sync: false
